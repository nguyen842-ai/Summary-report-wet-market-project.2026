<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dashboard - Miến Thaiwah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen">
        <div class="loading-container">
            <h2 style="color: var(--color-text-main); margin-bottom: 10px;">Loading Game</h2>
            <div class="progress-bar-bg">
                <div id="main-progress-bar"></div>
            </div>
            <p id="loading-status">Đang khởi động hệ thống...</p>
        </div>
    </div>

    <div id="dashboard-content">
        <header>
            <h1 style="color: var(--color-accent); margin-bottom: 20px;">BÁO CÁO DỰ ÁN</h1>
        </header>

        <section id="gantt-section">
            <h2 style="margin-bottom: 15px;">Tiến độ Gantt Chart</h2>
            <table id="gantt-table">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Task</th>
                        <th>PIC</th>
                        <th>W3-May</th>
                        <th>W4-May</th>
                        <th>W1-Jun</th>
                        <th>W2-Jun</th>
                        <th>W3-Jun</th>
                        <th>W4-Jun</th>
                    </tr>
                </thead>
                <tbody id="gantt-tbody">
                    </tbody>
            </table>
        </section>

        <section id="swot-section" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px;">
            <div class="swot-card">
                <h3>STRENGTHS (S)</h3>
                <ul id="swot-s"></ul>
            </div>
            <div class="swot-card">
                <h3>WEAKNESSES (W)</h3>
                <ul id="swot-w"></ul>
            </div>
            <div class="swot-card">
                <h3>OPPORTUNITIES (O)</h3>
                <ul id="swot-o"></ul>
            </div>
            <div class="swot-card">
                <h3>THREATS (T)</h3>
                <ul id="swot-t"></ul>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
